<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Liquid Glass Gallery</title>
  <style>
    body { margin:0; font-family: system-ui, sans-serif; background:#171714; color:#d4d4c8; }
    .row { display:flex; flex-wrap:wrap; gap:12px; padding:16px; }
    .control { padding:8px 12px; border:1px solid #4a4a43; border-radius:999px; background:#3a3a34; color:#d4d4c8; }
    .chip { padding:6px 10px; border:1px solid #4a4a43; border-radius:999px; background:#3a3a34; color:#d4d4c8; }
  </style>
</head>
<body>
  <div class="row">
    <button class="control folder-path-btn">folder-path-btn</button>
    <button class="control plus-btn">+</button>
    <button class="control selector-btn">Model ▼</button>
    <button class="control permission-btn">P</button>
    <button class="control permission-selector">Permissions</button>
    <button class="control assistant-action">Action</button>
    <button class="control action-btn">Action</button>
    <button class="control code-copy-btn">Copy</button>
    <span class="chip">.chip</span>
    <span class="chip quick-chip">quick-chip</span>
    <button class="control artifact-action-btn">Artifact</button>
    <button class="control stop-process-btn">Stop</button>
    <button class="control example-prompt">Example</button>
    <div class="control popup-menu">Popup Menu</div>
    <div class="control popup-option">Popup Option</div>
  </div>
</body>
</html>
